<body class="bg-background font-hanken-grotesk text-on-surface antialiased overflow-x-hidden min-h-screen flex flex-col items-center justify-center relative">
<!-- Abstract Railway Background -->
<div class="fixed inset-0 railway-pattern pointer-events-none"></div>
<svg class="route-line-svg opacity-10" fill="none" viewbox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
<path d="M-100 450C200 450 400 100 720 100C1040 100 1240 800 1540 800" stroke="#002068" stroke-dasharray="12 12" stroke-width="2"></path>
<path d="M-100 800C150 800 350 400 720 400C1090 400 1290 100 1540 100" stroke="#0058bc" stroke-dasharray="8 8" stroke-width="1"></path>
<circle cx="720" cy="100" fill="#002068" r="4"></circle>
<circle cx="720" cy="400" fill="#0058bc" r="4"></circle>

<main class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Brand Logo -->
<div class="flex justify-center mb-12">
<h1 class="font-headline-lg text-primary font-extrabold tracking-tight">RailVista</h1>
</div>
<!-- Login Card -->
<div class="glass-card p-8 md:p-10 rounded-xl shadow-lg shadow-primary/5 transition-all duration-300">
<header class="mb-8 text-center">
<h2 class="font-headline-lg text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-md text-on-surface-variant">Sign in to access your bookings and journeys</p>
</header>
<form class="space-y-6" onsubmit="return false">
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-surface border border-outline-variant rounded-lg font-label-md text-on-surface hover:bg-surface-container-low transition-all active:scale-[0.98]" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
<div class="relative flex items-center justify-center py-2">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant/50"></div></div>
<span class="relative bg-white/50 px-4 text-label-sm text-on-surface-variant uppercase tracking-wider">Or email</span>
</div>
<!-- Input Fields -->
<div class="space-y-4">
<div class="group">
<label class="block font-label-md text-on-surface mb-2 transition-colors group-focus-within:text-secondary" for="email">Email Address</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="group">
<div class="flex justify-between items-center mb-2">
<label class="block font-label-md text-on-surface transition-colors group-focus-within:text-secondary" for="password">Password</label>
<a class="font-label-md text-secondary hover:text-secondary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary bg-surface border-outline-variant rounded focus:ring-primary/20 transition-all cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-2 font-label-md text-on-surface-variant cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<!-- Primary Button -->
<button class="w-full py-4 bg-primary text-on-primary font-title-md rounded-lg shadow-md shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all duration-200" type="submit">
                    Sign In
                </button>
</form>
<footer class="mt-8 text-center">
<p class="font-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-label-md text-secondary hover:text-secondary-container transition-colors font-semibold" href="#">Create Account</a>
</p>
</footer>
</div>
<!-- Trust Indicators -->
<section class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="flex items-center gap-3 px-4">
<div class="w-8 h-8 rounded-full bg-secondary/10 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined !text-[18px]">verified_user</span>
</div>
<span class="font-label-sm text-on-surface-variant leading-tight">Secure Authentication</span>
</div>
<div class="flex items-center gap-3 px-4">
<div class="w-8 h-8 rounded-full bg-secondary/10 flex items-center justify-center text-secondary">

</div>

</div>

</div>

</div>
</section>
<!-- Global Footer Credit -->
<div class="mt-12 text-center">
<p class="text-label-sm text-outline font-medium tracking-wide">© 2024 RAILVISTA TECHNOLOGIES. ALL RIGHTS RESERVED.</p>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            const card = document.querySelector('.glass-card');

            // Subtle parallax effect on card based on mouse movement
            document.addEventListener('mousemove', (e) => {
                if (window.innerWidth > 768) {
                    const x = (e.clientX - window.innerWidth / 2) / 100;
                    const y = (e.clientY - window.innerHeight / 2) / 100;
                    card.style.transform = `translate(${x}px, ${y}px)`;
                }
            });

            // Focus states logging for visual check (demo only)
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.classList.add('scale-[1.01]');
                    input.style.boxShadow = '0 10px 15px -3px rgba(0, 88, 188, 0.1)';
                });
                input.addEventListener('blur', () => {
                    input.parentElement.classList.remove('scale-[1.01]');
                    input.style.boxShadow = 'none';
                });
            });
        });
    </script>
</body></html>
